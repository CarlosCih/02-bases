<section class="container py-4 py-md-5">
  <header class="text-center mb-4 mb-md-5">
    <h1 class="display-6 fw-bold mb-1">Dragon Ball</h1>
    <p class="text-secondary mb-0">Gestión de personajes</p>
  </header>

  <main class="row g-4 justify-content-center align-items-start">
    <div class="col-12 col-md-6 col-lg-5">
      <article class="card shadow-sm border-0 h-100">
        <div class="card-body p-4">
          <h2 class="h4 mb-4">Agregar personaje</h2>

          <form class="d-grid gap-3">
            <div>
              <label for="name" class="form-label fw-semibold">Nombre</label>
              <input class="form-control form-control-lg" id="name" type="text" placeholder="Nombre del personaje" />
            </div>

            <div>
              <label for="power" class="form-label fw-semibold">Poder</label>
              <input class="form-control form-control-lg" id="power" type="number" placeholder="Nivel de poder" />
            </div>

            <button class="btn btn-primary btn-lg mt-2" type="button">Agregar</button>
          </form>
        </div>
      </article>
    </div>

    <div class="col-12 col-md-6 col-lg-5">
      <article class="card shadow-sm border-0 h-100">
        <div class="card-body p-4">
          <h2 class="h4 mb-4">Listado</h2>

          <ul class="list-group list-group-flush">
            @for (character of characters(); track character.id; let idx = $index) {
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{idx + 1}}.- {{character.name}}</span>
                <strong
                [ngClass]="powerClasses()"
                >({{character.power}})</strong>
              </li>
            }
          </ul>
        </div>
      </article>
    </div>
  </main>
</section>
